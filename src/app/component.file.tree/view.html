<section [ngClass]="shellClass()">
    <div *ngIf="headerVisible()" [ngClass]="headerClass()">
        <div class="min-w-0">
            <h3 class="text-sm font-semibold text-zinc-950 dark:text-zinc-50">{{ title }}</h3>
            <p *ngIf="description && !isCompact()" class="mt-1 text-xs text-zinc-500 dark:text-zinc-400">{{ description }}</p>
        </div>
        <div [ngClass]="toolbarClass()">
            <label *ngIf="allowUpload" [ngClass]="toolbarButtonClass()" title="파일 업로드">
                <i class="fa-solid fa-file-arrow-up"></i>
                <span [ngClass]="toolbarLabelClass()">파일 업로드</span>
                <input type="file" multiple class="hidden" (change)="uploadFiles($event)" />
            </label>
            <label *ngIf="allowUpload" [ngClass]="toolbarButtonClass()" title="폴더 업로드">
                <i class="fa-solid fa-folder-plus"></i>
                <span [ngClass]="toolbarLabelClass()">폴더 업로드</span>
                <input type="file" multiple webkitdirectory class="hidden" (change)="uploadFiles($event)" />
            </label>
            <button *ngIf="allowMutate" type="button" (click)="createFolder()" [disabled]="busy" [ngClass]="toolbarButtonClass()" title="새 폴더">
                <i class="fa-solid fa-folder-plus"></i>
                <span [ngClass]="toolbarLabelClass()">새 폴더</span>
            </button>
            <button type="button" (click)="toggleHidden()" [disabled]="busy" [ngClass]="toolbarToggleClass()" [title]="showHidden ? '숨김 표시 중' : '숨김 파일'">
                <i class="fa-solid" [ngClass]="showHidden ? 'fa-eye' : 'fa-eye-slash'"></i>
                <span [ngClass]="toolbarLabelClass()">{{ showHidden ? '숨김 표시 중' : '숨김 파일' }}</span>
            </button>
            <button type="button" (click)="reload()" [disabled]="busy" [ngClass]="toolbarButtonClass()" title="새로고침">
                <i class="fa-solid" [ngClass]="busy ? 'fa-spinner fa-spin' : 'fa-rotate-right'"></i>
                <span [ngClass]="toolbarLabelClass()">새로고침</span>
            </button>
        </div>
    </div>

    <div [ngClass]="bodyClass()">
        <div *ngIf="error" class="rounded-md border border-rose-200 bg-rose-50 px-3 py-2 text-xs text-rose-700 dark:border-rose-900/70 dark:bg-rose-950/40 dark:text-rose-300">{{ error }}</div>
        <div [ngClass]="pathToolbarClass()">
            <div [ngClass]="crumbGroupClass()">
                <button *ngFor="let crumb of crumbs()" type="button" (click)="reload(crumb.path)" [disabled]="busy" [ngClass]="crumbButtonClass()">
                    <span class="truncate">{{ crumb.label }}</span>
                </button>
                <button *ngIf="parent" type="button" (click)="goParent()" [disabled]="busy" [ngClass]="parentButtonClass()" title="상위">
                    <i class="fa-solid fa-arrow-up"></i>
                    <span *ngIf="!isCompact()">상위</span>
                </button>
            </div>
            <button *ngIf="isCompact() && !headerVisible()" type="button" (click)="reload()" [disabled]="busy" [ngClass]="refreshButtonClass()" title="새로고침">
                <i class="fa-solid" [ngClass]="busy ? 'fa-spinner fa-spin' : 'fa-rotate-right'"></i>
            </button>
            <form *ngIf="!isCompact()" class="flex min-w-[220px] flex-1 items-center gap-2 lg:max-w-xl" (submit)="jumpToPath($event)">
                <input type="text" name="fileTreePath" [(ngModel)]="pathInput" [disabled]="busy" placeholder="경로 입력 후 Enter" class="h-8 w-full rounded-md border border-zinc-300 bg-white px-3 text-xs text-zinc-900 placeholder:text-zinc-400 disabled:opacity-60 dark:border-zinc-700 dark:bg-zinc-950 dark:text-zinc-100" />
                <button type="submit" [disabled]="busy" class="inline-flex h-8 shrink-0 items-center gap-2 rounded-md border border-zinc-300 px-2.5 text-xs font-semibold text-zinc-700 hover:bg-zinc-50 disabled:opacity-50 dark:border-zinc-700 dark:text-zinc-200 dark:hover:bg-zinc-800">
                    <i class="fa-solid fa-location-arrow"></i>
                    <span>이동</span>
                </button>
            </form>
        </div>
        <div [ngClass]="listClass()" [ngStyle]="listStyle()" (dragover)="allowTreeDrop($event)" (dragleave)="leaveTreeDrop($event)" (drop)="uploadDroppedFiles($event)">
            <div *ngIf="busy && items.length === 0" class="px-4 py-10 text-center text-sm text-zinc-500 dark:text-zinc-400">파일 목록을 불러오는 중입니다.</div>
            <div *ngIf="!busy && items.length === 0" class="px-4 py-10 text-center text-sm text-zinc-500 dark:text-zinc-400">표시할 항목이 없습니다.</div>
            <div
                *ngFor="let item of items"
                [draggable]="itemMutatable(item)"
                (dragstart)="dragStart(item)"
                (dragover)="allowDrop($event)"
                (drop)="dropOn(item, $event)"
                class="flex items-center justify-between gap-3 border-b last:border-b-0"
                [ngClass]="[itemRowClass(item), itemRowDensityClass()]"
            >
                <button type="button" (click)="openItem(item)" [ngClass]="itemButtonClass()">
                    <i class="fa-solid" [ngClass]="itemIconClass(item)"></i>
                    <span class="min-w-0">
                        <span class="block truncate text-sm font-semibold text-zinc-950 dark:text-zinc-50">{{ item.name }}</span>
                        <span *ngIf="!isCompact()" class="mt-0.5 block truncate text-xs text-zinc-500 dark:text-zinc-400">{{ item.path }}</span>
                    </span>
                </button>
                <div class="flex shrink-0 items-center gap-2">
                    <span *ngIf="item.protected" class="hidden rounded-md border border-amber-200 bg-amber-50 px-2 py-0.5 text-[11px] font-semibold text-amber-700 dark:border-amber-900/70 dark:bg-amber-950/40 dark:text-amber-300 md:inline-flex">보호됨</span>
                    <span *ngIf="!isCompact()" class="hidden text-xs text-zinc-500 dark:text-zinc-400 md:inline">{{ item.type === 'folder' ? '폴더' : formatBytes(item.size) }}</span>
                    <button *ngIf="downloadableItem(item)" type="button" (click)="downloadItem(item, $event)" [disabled]="busy" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-zinc-300 text-zinc-600 hover:bg-zinc-50 disabled:opacity-40 dark:border-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-800" [title]="downloadTitle(item)">
                        <i class="fa-solid fa-download text-xs"></i>
                    </button>
                    <button *ngIf="allowMutate" type="button" (click)="renameItem(item)" [disabled]="!itemMutatable(item)" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-zinc-300 text-zinc-600 hover:bg-zinc-50 disabled:opacity-40 dark:border-zinc-700 dark:text-zinc-300 dark:hover:bg-zinc-800" [title]="item.protected ? '시스템 보호 경로는 이름을 변경할 수 없습니다.' : '이름 변경'">
                        <i class="fa-solid fa-pen text-xs"></i>
                    </button>
                    <button *ngIf="allowMutate" type="button" (click)="deleteItem(item)" [disabled]="!itemMutatable(item)" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-rose-300 text-rose-700 hover:bg-rose-50 disabled:opacity-40 dark:border-rose-900/70 dark:text-rose-300 dark:hover:bg-rose-950/30" [title]="item.protected ? '시스템 보호 경로는 삭제할 수 없습니다.' : '삭제'">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

<div *ngIf="previewOpen" class="fixed inset-0 z-[90] flex items-center justify-center bg-zinc-950/60 px-4 py-6">
    <section class="relative flex max-h-[calc(100vh-3rem)] w-full max-w-4xl flex-col overflow-hidden rounded-md border border-zinc-200 bg-white shadow-xl dark:border-zinc-800 dark:bg-zinc-900">
        <div class="flex items-center justify-between border-b border-zinc-200 px-5 py-4 dark:border-zinc-800">
            <div class="min-w-0">
                <h3 class="truncate text-sm font-semibold text-zinc-950 dark:text-zinc-50">{{ previewTitle }}</h3>
            </div>
            <button type="button" (click)="closePreview()" class="inline-flex h-8 w-8 items-center justify-center rounded-md text-zinc-500 hover:bg-zinc-100 dark:text-zinc-400 dark:hover:bg-zinc-800">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <pre class="min-h-0 flex-1 overflow-auto bg-zinc-950 px-4 py-4 text-xs text-zinc-50">{{ previewContent }}</pre>
    </section>
</div>
